<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anyo_n_jime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Varela+Round&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="hero">
  <!-- pixel hearts row -->
  <div class="pixel-hearts-top" aria-hidden="true">
    <svg width="28" height="26" viewBox="0 0 7 6"><rect x="1" y="0" width="2" height="1" fill="#e02020"/><rect x="4" y="0" width="2" height="1" fill="#e02020"/><rect x="0" y="1" width="7" height="2" fill="#e02020"/><rect x="0" y="3" width="7" height="1" fill="#e02020"/><rect x="1" y="4" width="5" height="1" fill="#e02020"/><rect x="2" y="5" width="3" height="1" fill="#e02020"/></svg>
    <svg width="20" height="18" viewBox="0 0 7 6"><rect x="1" y="0" width="2" height="1" fill="#f2a7b8"/><rect x="4" y="0" width="2" height="1" fill="#f2a7b8"/><rect x="0" y="1" width="7" height="2" fill="#f2a7b8"/><rect x="0" y="3" width="7" height="1" fill="#f2a7b8"/><rect x="1" y="4" width="5" height="1" fill="#f2a7b8"/><rect x="2" y="5" width="3" height="1" fill="#f2a7b8"/></svg>
    <svg width="28" height="26" viewBox="0 0 7 6"><rect x="1" y="0" width="2" height="1" fill="#e02020"/><rect x="4" y="0" width="2" height="1" fill="#e02020"/><rect x="0" y="1" width="7" height="2" fill="#e02020"/><rect x="0" y="3" width="7" height="1" fill="#e02020"/><rect x="1" y="4" width="5" height="1" fill="#e02020"/><rect x="2" y="5" width="3" height="1" fill="#e02020"/></svg>
    <svg width="20" height="18" viewBox="0 0 7 6"><rect x="1" y="0" width="2" height="1" fill="#f2a7b8"/><rect x="4" y="0" width="2" height="1" fill="#f2a7b8"/><rect x="0" y="1" width="7" height="2" fill="#f2a7b8"/><rect x="0" y="3" width="7" height="1" fill="#f2a7b8"/><rect x="1" y="4" width="5" height="1" fill="#f2a7b8"/><rect x="2" y="5" width="3" height="1" fill="#f2a7b8"/></svg>
    <svg width="28" height="26" viewBox="0 0 7 6"><rect x="1" y="0" width="2" height="1" fill="#e02020"/><rect x="4" y="0" width="2" height="1" fill="#e02020"/><rect x="0" y="1" width="7" height="2" fill="#e02020"/><rect x="0" y="3" width="7" height="1" fill="#e02020"/><rect x="1" y="4" width="5" height="1" fill="#e02020"/><rect x="2" y="5" width="3" height="1" fill="#e02020"/></svg>
  </div>

  <!-- pixel cats -->
  <div class="hero-cats" aria-hidden="true">
    <!-- black cat -->
    <svg width="54" height="64" viewBox="0 0 9 11">
      <!-- ears -->
      <rect x="1" y="0" width="2" height="2" fill="#1a1a1a"/>
      <rect x="6" y="0" width="2" height="2" fill="#1a1a1a"/>
      <rect x="2" y="1" width="1" height="1" fill="#b06040"/>
      <rect x="6" y="1" width="1" height="1" fill="#b06040"/>
      <!-- head -->
      <rect x="1" y="2" width="7" height="5" fill="#1a1a1a"/>
      <!-- eyes -->
      <rect x="2" y="3" width="2" height="2" fill="#e8c020"/>
      <rect x="5" y="3" width="2" height="2" fill="#e8c020"/>
      <rect x="3" y="3" width="1" height="2" fill="#1a1a1a"/>
      <rect x="6" y="3" width="1" height="2" fill="#1a1a1a"/>
      <!-- nose -->
      <rect x="4" y="5" width="1" height="1" fill="#d06060"/>
      <!-- body -->
      <rect x="2" y="7" width="5" height="4" fill="#1a1a1a"/>
      <!-- tail -->
      <rect x="0" y="8" width="2" height="1" fill="#1a1a1a"/>
      <rect x="0" y="9" width="1" height="1" fill="#1a1a1a"/>
    </svg>

    <!-- big pixel heart between cats -->
    <svg width="40" height="36" viewBox="0 0 7 6" style="margin-bottom:8px">
      <rect x="1" y="0" width="2" height="1" fill="#e02020"/>
      <rect x="4" y="0" width="2" height="1" fill="#e02020"/>
      <rect x="0" y="1" width="7" height="2" fill="#e02020"/>
      <rect x="0" y="3" width="7" height="1" fill="#e02020"/>
      <rect x="1" y="4" width="5" height="1" fill="#e02020"/>
      <rect x="2" y="5" width="3" height="1" fill="#e02020"/>
    </svg>

    <!-- white cat with bow -->
    <svg width="54" height="64" viewBox="0 0 9 11">
      <!-- ears -->
      <rect x="1" y="0" width="2" height="2" fill="#e8e8e0"/>
      <rect x="6" y="0" width="2" height="2" fill="#e8e8e0"/>
      <rect x="2" y="1" width="1" height="1" fill="#f2a7b8"/>
      <rect x="6" y="1" width="1" height="1" fill="#f2a7b8"/>
      <!-- head -->
      <rect x="1" y="2" width="7" height="5" fill="#e8e8e0"/>
      <!-- eyes -->
      <rect x="2" y="3" width="2" height="2" fill="#2a2a2a"/>
      <rect x="5" y="3" width="2" height="2" fill="#2a2a2a"/>
      <!-- blush -->
      <rect x="2" y="5" width="1" height="1" fill="#f2a7b8"/>
      <rect x="6" y="5" width="1" height="1" fill="#f2a7b8"/>
      <!-- nose -->
      <rect x="4" y="5" width="1" height="1" fill="#d06080"/>
      <!-- body -->
      <rect x="2" y="7" width="5" height="4" fill="#e8e8e0"/>
      <!-- bow -->
      <rect x="3" y="7" width="1" height="1" fill="#d4607a"/>
      <rect x="5" y="7" width="1" height="1" fill="#d4607a"/>
      <rect x="4" y="7" width="1" height="1" fill="#f2a7b8"/>
    </svg>
  </div>

  <h1 class="site-title">anyo_n_jime</h1>
  <p class="site-sub">a digital library of me and my pookie &lt;3</p>
</header>

<nav class="site-nav" role="navigation" aria-label="sections">
  <button class="nav-btn active" data-section="journal">📓 journal</button>
  <button class="nav-btn" data-section="us">📷 us</button>
  <button class="nav-btn" data-section="gallery2">🎨 gallery 2</button>
  <button class="nav-btn" data-section="prompts">💬 prompts</button>
</nav>

<main class="container">

  <section id="sec-journal" class="section">
    <div id="journal-entries"></div>
  </section>

  <section id="sec-us" class="section hidden">
    <div class="gallery-grid" id="gallery-us"></div>
  </section>

  <section id="sec-gallery2" class="section hidden">
    <div id="gallery-descriptions"></div>
  </section>

  <section id="sec-prompts" class="section hidden">
    <div id="prompts-list"></div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
